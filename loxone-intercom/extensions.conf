[general]
static=yes
writeprotect=no

[intercom-context]
; Individuele tablets bellen (20 seconden rinkelen)
exten => 101,1,Dial(SIP/101,20)
exten => 101,n,Hangup()

exten => 102,1,Dial(SIP/102,20)
exten => 102,n,Hangup()

exten => 103,1,Dial(SIP/103,20)
exten => 103,n,Hangup()

exten => 104,1,Dial(SIP/104,20)
exten => 104,n,Hangup()

; Extensie 200: Groepsgesprek (Conferentie)
exten => 200,1,ConfBridge(1)
exten => 200,n,Hangup()

; Extensie 300: Alle tablets tegelijk bellen (Deurbel functie)
exten => 300,1,NoOp(Loxone Deurbel activeert alle tablets)
exten => 300,n,Dial(SIP/101&SIP/102&SIP/103&SIP/104,20)
exten => 300,n,Hangup()

; Extensie 400: Paging / Omroep (Automatisch antwoorden/Intercom)
exten => 400,1,NoOp(Loxone Omroepbericht)
exten => 400,n,SIPAddHeader(Alert-Info: Intercom)
exten => 400,n,Page(SIP/101&SIP/102&SIP/103&SIP/104,i)
exten => 400,n,Hangup()
